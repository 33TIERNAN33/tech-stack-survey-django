{% extends "base.html" %}

{% block title %}{{ page_title }} | CareTrack{% endblock %}

{% block content %}
  <section class="page-panel">
    <h1 class="display-6 fw-bold">{{ page_title }}</h1>

    <form method="post" class="mt-4">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div class="row g-3">
        {% for field in form %}
          <div class="col-md-6">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
          </div>
        {% endfor %}
      </div>

      <button type="submit" class="btn btn-success mt-4">{{ button_text }}</button>
      <a href="{% url 'available_inventory' %}" class="btn btn-outline-secondary mt-4">Cancel</a>
    </form>
  </section>
{% endblock %}
